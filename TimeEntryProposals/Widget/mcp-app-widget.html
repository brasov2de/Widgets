<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool Input Viewer</title>
  <script src="https://unpkg.com/@fluentui/web-components@beta/dist/web-components.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: var(--fontFamilyBase, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      font-size: 14px;
      line-height: 1.5;
      background: var(--colorNeutralBackground1, #fff);
      color: var(--colorNeutralForeground1, #242424);
      overflow-x: hidden;
    }

    #widget-root {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--colorNeutralForeground1);
      margin: 0;
    }

    .date-range {
      font-size: 0.75rem;
      color: var(--colorNeutralForeground3, #616161);
      margin-left: auto;
    }

    .meta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 12px;
      background: var(--colorNeutralBackground2, #f5f5f5);
      color: var(--colorNeutralForeground2, #424242);
      border: 1px solid var(--colorNeutralStroke2, #e0e0e0);
    }

    .textarea-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--colorNeutralForeground2, #424242);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    fluent-textarea {
      width: 100%;
    }

    fluent-textarea::part(control) {
      font-family: 'Cascadia Code', 'Consolas', 'Fira Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      min-height: 280px;
      background: var(--colorNeutralBackground2, #f5f5f5);
      color: var(--colorNeutralForeground1, #242424);
      border-color: var(--colorNeutralStroke1, #d1d1d1);
      border-radius: 8px;
    }

    .copy-row {
      display: flex;
      justify-content: flex-end;
    }

    .loading-state, .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 32px 16px;
      text-align: center;
      color: var(--colorNeutralForeground2, #424242);
    }

    .error-state {
      color: var(--colorStatusDangerForeground1, #bc2f32);
    }

    @media (prefers-reduced-motion: no-preference) {
      fluent-button {
        transition: opacity 0.2s ease;
      }
    }
  </style>
</head>
<body>
  <div id="widget-root"></div>
  <script type="module">
    import { App } from 'https://cdn.jsdelivr.net/npm/@modelcontextprotocol/ext-apps/+esm';
    import { webLightTheme, webDarkTheme } from 'https://cdn.jsdelivr.net/npm/@fluentui/tokens/+esm';

    const root = document.getElementById('widget-root');
    let hasRenderedData = false;

    function loadPreviewData() {
      renderData({
        "dateFrom": "2026-05-04",
        "dateTo": "2026-05-11",
        "timeEntries": [
          {
            "id": "76b7ee00-3a50-f111-a824-0022481f023c",
            "date": "2026-05-08T00:00:00Z",
            "duration_hours": 60,
            "taskDescription": "Widgets filtering1",
            "project": {
              "id": "09e35d36-f129-f111-88b5-002248325389",
              "name": "Magic React",
              "category": null,
              "description": null
            },
            "owner": "Diana Birkelbach"
          }
        ],
        "passedProposals": [
          {
            "start": "2026-06-22T12:00:00Z",
            "duration": 120,
            "title": "test Magic",
            "project": {
              "id": "09e35d36-f129-f111-88b5-002248325389",
              "name": "Magic React",
              "category": null,
              "description": null
            }
          }
        ]
      });
    }

    function applyTheme(theme) {
      const tokens = theme === 'dark' ? webDarkTheme : webLightTheme;
      const docRoot = document.documentElement;
      for (const [token, value] of Object.entries(tokens)) {
        docRoot.style.setProperty('--' + token, value);
      }
      document.body.style.background = theme === 'dark'
        ? 'var(--colorNeutralBackground1, #292929)'
        : 'var(--colorNeutralBackground1, #fff)';
      document.body.style.color = theme === 'dark'
        ? 'var(--colorNeutralForeground1, #e0e0e0)'
        : 'var(--colorNeutralForeground1, #242424)';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        return new Date(dateStr).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      } catch { return dateStr; }
    }

    function renderLoading() {
      root.innerHTML = `
        <div class="loading-state">
          <fluent-spinner></fluent-spinner>
          <span>Loading tool output…</span>
        </div>`;
    }

    function renderError(message) {
      root.innerHTML = `
        <div class="error-state">
          <span>⚠ ${escapeHtml(message)}</span>
          <fluent-button id="retry-btn" appearance="outline">Try again</fluent-button>
        </div>`;
    }

    function renderData(data) {
      hasRenderedData = true;

      const dateFrom = (data.dateFrom == null || String(data.dateFrom).trim() === '') ? null : String(data.dateFrom).trim();
      const dateTo   = (data.dateTo   == null || String(data.dateTo).trim()   === '') ? null : String(data.dateTo).trim();
      const timeEntries    = Array.isArray(data.timeEntries)    ? data.timeEntries    : [];
      const passedProposals = Array.isArray(data.passedProposals) ? data.passedProposals : [];

      const dateRangeText = (dateFrom && dateTo)
        ? `${formatDate(dateFrom)} – ${formatDate(dateTo)}`
        : (dateFrom || dateTo || '');

      const prettyJson = JSON.stringify(data, null, 2);

      root.innerHTML = `
        <div class="header">
          <h2 class="header-title">Tool Output</h2>
          ${dateRangeText ? `<span class="date-range">${escapeHtml(dateRangeText)}</span>` : ''}
        </div>

        <div class="meta-row">
          <span class="meta-badge">⏱ ${timeEntries.length} time entr${timeEntries.length === 1 ? 'y' : 'ies'}</span>
          <span class="meta-badge">📋 ${passedProposals.length} proposal${passedProposals.length === 1 ? '' : 's'}</span>
        </div>

        <div class="textarea-label">Raw JSON</div>

        <fluent-textarea id="json-output" readonly resize="vertical">
          <textarea id="json-textarea" readonly>${escapeHtml(prettyJson)}</textarea>
        </fluent-textarea>

        <div class="copy-row">
          <fluent-button id="copy-btn" appearance="outline">Copy JSON</fluent-button>
        </div>`;

      // Use the inner textarea value for proper monospace display
      const textarea = root.querySelector('fluent-textarea');
      if (textarea) {
        // Set value via property after render
        requestAnimationFrame(() => {
          const inner = root.querySelector('#json-textarea') || textarea;
          if (inner && inner !== textarea) {
            inner.value = prettyJson;
          }
          // Try the fluent-textarea value property
          try { textarea.value = prettyJson; } catch (_) {}
        });
      }

      root.querySelector('#copy-btn')?.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(prettyJson);
          const btn = root.querySelector('#copy-btn');
          if (btn) {
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = 'Copy JSON'; }, 1500);
          }
        } catch (_) {}
      });
    }

    // Show loading immediately
    renderLoading();

    const app = new App({ name: "tool-input-viewer", version: "1.0.0" });
    try{
    app.ontoolresult = (result) => {
      const data = result.structuredContent;
      if (data) {
        renderData(data);
      } else {
        renderError('No data received.');
      }
    };

    app.onhostcontextchanged = (ctx) => {
      if (ctx.theme) applyTheme(ctx.theme);
    };

    app.onteardown = () => ({});

    await app.connect();

  
    setTimeout(() => {
        if (!hasRenderedData) {
          loadPreviewData();
        }
      }, 800);
  }
  catch (err) {
    loadPreviewData();
    console.error(err);
  }
  </script>
</body>
</html>
