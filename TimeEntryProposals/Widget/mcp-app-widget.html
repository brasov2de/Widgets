<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/@fluentui/web-components@beta/dist/web-components.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: var(--fontFamilyBase, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      font-size: 14px;
      line-height: 1.5;
      background: var(--colorNeutralBackground1, #fff);
      color: var(--colorNeutralForeground1, #242424);
    }

    #widget-root {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .widget-meta {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(160px, 220px);
      gap: 12px;
    }
    .meta-card {
      border: 1px solid var(--colorNeutralStroke1, #d1d1d1);
      border-radius: 16px;
      padding: 12px 16px;
      background: linear-gradient(135deg, var(--colorNeutralBackground2, #f5f5f5), var(--colorNeutralBackground1, #fff));
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }
    .meta-card-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--colorNeutralForeground2, #616161);
    }
    .meta-card-value {
      margin-top: 6px;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--colorNeutralForeground1, #242424);
    }
    .meta-card-subtitle {
      margin-top: 4px;
      font-size: 0.8rem;
      color: var(--colorNeutralForeground2, #616161);
    }
    .filter-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--colorNeutralStroke2, #e8e8e8);
      background: var(--colorNeutralBackground1, #fff);
      color: var(--colorNeutralForeground1, #242424);
    }
    .filter-key {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--colorNeutralForeground2, #616161);
    }
    .filter-value {
      font-size: 0.82rem;
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .filter-empty {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--colorNeutralForeground3, #a0a0a0);
    }

    /* ── Week navigation ── */
    .week-nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 4px;
      border: 1px solid var(--colorNeutralStroke1, #d1d1d1);
      border-radius: 16px;
      background: linear-gradient(135deg, var(--colorNeutralBackground2, #f5f5f5), var(--colorNeutralBackground1, #fff));
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }
    .week-label {
      min-width: 0;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .week-total {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--colorNeutralForeground2, #616161);
    }
    .week-nav fluent-button {
      cursor: pointer;
    }
    .week-nav fluent-button::part(control) {
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .week-nav fluent-button:hover::part(control) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12);
    }

    .week-summary-gallery {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .summary-pill {
      border: 1px solid var(--colorNeutralStroke1, #d1d1d1);
      border-radius: 12px;
      background: linear-gradient(135deg, var(--colorNeutralBackground1, #fff), var(--colorNeutralBackground2, #f5f5f5));
      padding: 8px;
      min-width: 0;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }
    .summary-pill.has-hours {
      border-color: #2f855a;
      background: linear-gradient(135deg, #f2fbf6, #e0f4e8);
      box-shadow: 0 8px 18px rgba(47, 133, 90, 0.18);
    }
    .summary-pill.has-hours .summary-day {
      color: #1f5f3f;
    }
    .summary-pill.has-hours .summary-value {
      color: #174d33;
    }
    .summary-pill.has-hours .summary-date {
      color: #245d3f;
    }
    .summary-pill.is-today {
      border-color: var(--colorBrandBackground, #0078d4);
      box-shadow: 0 0 0 1px var(--colorBrandBackground, #0078d4), 0 12px 24px rgba(0, 120, 212, 0.12);
    }
    .summary-pill.has-hours.is-today {
      background: linear-gradient(135deg, #edf6ff, #ddf0ff);
      box-shadow: 0 0 0 1px var(--colorBrandBackground, #0078d4), 0 14px 28px rgba(0, 120, 212, 0.2);
    }
    .summary-pill.has-hours.is-today .summary-day,
    .summary-pill.has-hours.is-today .summary-date {
      color: #0f4f85;
    }
    .summary-pill.has-hours.is-today .summary-value {
      color: #0b3a63;
    }
    .summary-day {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--colorNeutralForeground2, #616161);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .summary-value {
      margin-top: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--colorNeutralForeground1, #242424);
      line-height: 1.2;
    }
    .summary-date {
      margin-top: 2px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--colorNeutralForeground2, #616161);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .summary-meta {
      margin-top: 2px;
      font-size: 0.68rem;
      color: var(--colorNeutralForeground3, #a0a0a0);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Days grid ── */
    .days-scroll {
      overflow: visible;
    }
    .days-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      min-width: 0;
    }

    /* ── Day column ── */
    .day-column {
      position: relative;
      border: 1px solid var(--colorNeutralStroke1, #d1d1d1);
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, var(--colorNeutralBackground2, #f5f5f5), var(--colorNeutralBackground1, #fff));
      display: flex;
      flex-direction: column;
      min-height: 140px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    .day-column::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 42%);
    }
    .day-column.is-today {
      border-color: var(--colorBrandBackground, #0078d4);
      box-shadow: 0 0 0 1px var(--colorBrandBackground, #0078d4), 0 14px 36px rgba(0, 120, 212, 0.16);
    }
    @media (prefers-reduced-motion: no-preference) {
      .day-column {
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }
    }
    .day-column:hover {
      transform: translateY(-2px);
    }
    .day-column.drag-over {
      background: linear-gradient(180deg, var(--colorNeutralBackground3, #ebebeb), var(--colorNeutralBackground1, #fff));
      border-color: var(--colorBrandBackground, #0078d4) !important;
      box-shadow: 0 0 0 1px var(--colorBrandBackground, #0078d4), 0 14px 36px rgba(0, 120, 212, 0.18);
      transform: translateY(-2px);
    }

    /* ── Day header ── */
    .day-header {
      padding: 12px 16px;
      background: linear-gradient(135deg, var(--colorNeutralBackground3, #ebebeb), var(--colorNeutralBackground2, #f5f5f5));
      border-bottom: 1px solid var(--colorNeutralStroke2, #e8e8e8);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    .day-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
    }
    .day-today-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--colorBrandBackground, #0078d4);
      margin-left: 6px;
      vertical-align: middle;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--colorBrandBackground, #0078d4) 18%, transparent);
    }
    .entries-list {
      padding: 12px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .empty-day {
      padding: 20px 12px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--colorNeutralForeground3, #a0a0a0);
      border: 1px dashed var(--colorNeutralStroke2, #e8e8e8);
      border-radius: 12px;
      background: var(--colorNeutralBackground2, #f5f5f5);
      grid-column: 1 / -1;
    }

    .entries-table-shell {
      border: 1px solid var(--colorNeutralStroke2, #e8e8e8);
      border-radius: 14px;
      overflow: hidden;
      background: var(--colorNeutralBackground1, #fff);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }
    .entries-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .entries-table thead th {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--colorNeutralForeground2, #616161);
      background: var(--colorNeutralBackground2, #f5f5f5);
      border-bottom: 1px solid var(--colorNeutralStroke2, #e8e8e8);
    }
    .entries-table tbody tr {
      cursor: grab;
      user-select: none;
    }
    @media (prefers-reduced-motion: no-preference) {
      .entries-table tbody tr {
        transition: transform 0.2s ease, background 0.2s ease, opacity 0.15s ease;
      }
    }
    .entries-table tbody tr:hover {
      background: var(--colorNeutralBackground2, #f5f5f5);
      transform: translateY(-1px);
    }
    .entries-table tbody tr + tr td {
      border-top: 1px solid var(--colorNeutralStroke2, #e8e8e8);
    }
    .entries-table td {
      padding: 12px;
      vertical-align: top;
      color: var(--colorNeutralForeground1, #242424);
    }
    .entry-row {
      position: relative;
    }
    .entry-row:active {
      cursor: grabbing;
    }
    .entry-row.dragging {
      opacity: 0.35;
      transform: scale(0.99);
    }
    .entry-category-cell {
      width: 16px;
      padding: 0 !important;
      background: var(--colorNeutralBackground1, #fff);
    }
    .entry-category-bar {
      width: 100%;
      min-height: 52px;
      background: var(--entry-accent, var(--colorBrandBackground, #0078d4));
    }
    .entry-description {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: normal;
      overflow-wrap: anywhere;
      color: var(--colorNeutralForeground1, #242424);
    }
    .entry-project {
      font-size: 0.8rem;
      color: var(--colorNeutralForeground2, #616161);
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .entry-category-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--colorNeutralForeground2, #616161);
    }
    .entry-duration {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--colorBrandBackground, #0078d4);
      color: var(--colorNeutralForegroundOnBrand, #fff);
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 8px 18px rgba(0, 120, 212, 0.18);
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .widget-meta {
        grid-template-columns: 1fr;
      }

      .week-label {
        font-size: 0.95rem;
      }

      .week-summary-gallery {
        gap: 4px;
      }

      .summary-pill {
        padding: 6px 4px;
        border-radius: 10px;
      }

      .summary-day {
        font-size: 0.62rem;
        letter-spacing: 0.02em;
      }

      .summary-value {
        font-size: 0.78rem;
      }

      .summary-meta {
        font-size: 0.62rem;
      }

      .entries-table,
      .entries-table thead,
      .entries-table tbody,
      .entries-table tr,
      .entries-table th,
      .entries-table td {
        display: block;
      }

      .entries-table thead {
        display: none;
      }

      .entries-table tbody tr {
        display: grid;
        grid-template-columns: 10px 1fr;
      }

      .entries-table tbody tr + tr td {
        border-top: 0;
      }

      .entry-category-cell {
        grid-row: 1 / span 4;
      }

      .entries-table td {
        padding: 8px 12px;
      }

      .entry-value-cell {
        padding-top: 0;
      }
    }

    /* ── Loading / Error ── */
    .loading-state, .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      text-align: center;
    }
    .error-message {
      color: var(--colorStatusDangerForeground1, #d13438);
      font-weight: 500;
    }
    .error-hint {
      font-size: 0.875rem;
      color: var(--colorNeutralForeground2, #616161);
    }
  </style>
</head>
<body>
  <div id="widget-root"></div>

  <script type="module">
    import { App } from 'https://cdn.jsdelivr.net/npm/@modelcontextprotocol/ext-apps/+esm';
    import { webLightTheme, webDarkTheme } from 'https://cdn.jsdelivr.net/npm/@fluentui/tokens/+esm';

    // ── State ──
    //let allEntries = [];
    let version = "62";
    let currentFilterParams = [];
    let currentWeekStart = getWeekStart(new Date());
    let draggedId = null;
    let hasRenderedData = false;
    let myResult = {};    


    // ── Theme ──
    function applyTheme(theme) {
      const tokens = theme === 'dark' ? webDarkTheme : webLightTheme;
      const root = document.documentElement;
      for (const [token, value] of Object.entries(tokens)) {
        root.style.setProperty('--' + token, value);
      }
      document.body.style.background = theme === 'dark'
        ? 'var(--colorNeutralBackground1, #1f1f1f)'
        : 'var(--colorNeutralBackground1, #fff)';
      document.body.style.color = theme === 'dark'
        ? 'var(--colorNeutralForeground1, #e0e0e0)'
        : 'var(--colorNeutralForeground1, #242424)';
    }

    // ── Date utilities ──
    function getWeekStart(date) {
      const d = new Date(date);
      const day = d.getDay(); // 0=Sun … 6=Sat
      const diff = day === 0 ? -6 : 1 - day; // shift to Monday
      d.setDate(d.getDate() + diff);
      d.setHours(0, 0, 0, 0);
      return d;      
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function parseEntryDate(value) {
      if (value == null) return null;
      const text = String(value).trim();
      if (text === '') return null;

      const dateOnlyMatch = /^(\d{4})-(\d{2})-(\d{2})$/.exec(text);
      if (dateOnlyMatch) {
        const [, year, month, day] = dateOnlyMatch;
        return new Date(Number(year), Number(month) - 1, Number(day));
      }

      const parsed = new Date(text);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    /** Local-date key YYYY-MM-DD */
    function dateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    /** Derive local-date key from an ISO entry date */
    function entryDateKey(isoString) {
      const parsed = parseEntryDate(isoString);
      return parsed ? dateKey(parsed) : null;
    }

    /** Today's local-date key */
    function todayKey() {
      return dateKey(new Date());
    }

    function formatDuration(totalHours) {
      const hours = parseFloat(totalHours);
      if (!Number.isFinite(hours) || hours === 0) return '0h';

      const durationInHours = Number.isInteger(hours) ? (hours / 60) : hours;
      const roundedHours = Math.round(durationInHours * 100) / 100;
      return `${roundedHours.toFixed(2)}h`;
    }

    function formatWeekRange(weekStart) {
      const weekEnd = addDays(weekStart, 6);
      const startStr = weekStart.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const endStr   = weekEnd.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      return `${startStr} – ${endStr}`;
    }

    function formatDayHeader(date) {
      return date.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function formatSummaryDay(date) {
      return date.toLocaleDateString(undefined, { weekday: 'short' });
    }

    function formatSummaryDate(date) {
      return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function normalizeEntry(entry) {
      const duration = parseFloat(entry?.duration);
      return {
        ...entry,
        timeentryid: String(entry?.timeentryid ?? ''),
        projectName: (entry?.projectName == null || String(entry.projectName).trim() === '')
          ? 'Unassigned project'
          : String(entry.projectName).trim(),
        projectCategoryName: (entry?.projectCategoryName == null || String(entry.projectCategoryName).trim() === '')
          ? ''
          : String(entry.projectCategoryName).trim(),
        description: (entry?.taskDescription == null || String(entry.taskDescription).trim() === '')
          ? ''
          : String(entry.taskDescription).trim(),
        date: entry?.date ?? '',
        duration: Number.isFinite(duration) ? duration : 0
      };
    }

    function formatFilterLabel(key) {
      return String(key ?? '')
        .replace(/([a-z0-9])([A-Z])/g, '$1 $2')
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function formatFilterValue(value) {
      if (value == null) return '';

      const text = String(value).trim();
      if (text === '') return '';

      const parsedDate = parseEntryDate(text);
      if (parsedDate && /^\d{4}-\d{2}-\d{2}$/.test(text)) {
        return parsedDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      }

      return text;
    }

    function getFilterParamsFromData(data) {
      if (data == null || typeof data !== 'object' || Array.isArray(data)) {
        return [];
      }

      const rawFilters = data.filterParams;
      if (rawFilters == null || typeof rawFilters !== 'object' || Array.isArray(rawFilters)) {
        return [];
      }

      return Object.entries(rawFilters).flatMap(([key, value]) => {
        const formattedValue = formatFilterValue(value);
        if (formattedValue === '') {
          return [];
        }

        return [{
          key: formatFilterLabel(key),
          value: formattedValue
        }];
      });
    }

    function getEntriesFromProposals(data) {
      if (Array.isArray(data?.proposals)) {
        proposals = (data?.proposals ?? []).map(normalizeEntry);
      }
      dateFrom = parseEntryDate(data?.dateFrom);
      dateTo = parseEntryDate(data?.dateTo);      
    }

    function getInitialWeekStart() {
      const filterDateFrom = parseEntryDate(dateFrom);
      if (filterDateFrom) {
        return getWeekStart(filterDateFrom);
      }

      const firstDatedEntry = entries.find((entry) => parseEntryDate(entry.date));
      return firstDatedEntry ? getWeekStart(parseEntryDate(firstDatedEntry.date)) : getWeekStart(new Date());
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text ?? '');
      return div.innerHTML;
    }

    function getCategoryAccent(category) {
      const palette = ['#ff6b6b', '#f59e0b', '#22c55e', '#06b6d4', '#6366f1', '#d946ef', '#14b8a6'];
      const text = (category == null || String(category).trim() === '')
        ? 'uncategorized'
        : String(category).trim().toLowerCase();

      let hash = 0;
      for (let index = 0; index < text.length; index += 1) {
        hash = ((hash << 5) - hash + text.charCodeAt(index)) | 0;
      }

      return palette[Math.abs(hash) % palette.length];
    }

    // ── Render: Loading ──
    function renderLoading() {
      document.getElementById('widget-root').innerHTML = `
        <div class="loading-state">
          <fluent-spinner></fluent-spinner>
          <span style="color:var(--colorNeutralForeground2)">Loading time entries…</span>
        </div>`;
    }

    // ── Render: Error ──
    function renderError(message) {
      hasRenderedData = false;
      document.getElementById('widget-root').innerHTML = `
        <div class="error-state">
          <span class="error-message">⚠ ${escapeHtml(message)}</span>
          <span class="error-hint">Something went wrong. Please try again in chat.</span>
        </div>`;
    }

    // ── Render: Full widget ──
    function renderWidget() {
      const root = document.getElementById('widget-root');
      const today = todayKey();
      hasRenderedData = true;

      // Build 7-day range for the selected week
      const weekDays = Array.from({ length: 7 }, (_, i) => addDays(currentWeekStart, i));
      const weekKeys = weekDays.map(dateKey);
      const recordsCount = timeEntries.length;

      // Group entries by local date key
      const byDay = {};
      for (const key of weekKeys) byDay[key] = [];
      for (const entry of timeEntries) {
        const key = entryDateKey(entry.date);
        if (key && key in byDay) byDay[key].push(entry);
      }

      // Week total
      const weekMinutes = weekKeys.reduce(
        (sum, k) => sum + byDay[k].reduce((s, e) => s + (parseInt(e.duration) || 0), 0), 0
      );

      const weekSummary = weekDays.map((day, index) => {
        const key = weekKeys[index];
        const entries = byDay[key];
        const total = entries.reduce((sum, entry) => sum + (parseFloat(entry.duration) || 0), 0);
        return `

    function buildDayColumn(day, key, entries, today) {
      const isToday = key === today;
      const hasEntries = entries.length > 0;

          <div class="day-header">

    function buildEntriesTable(entries) {
      return `

            <thead>

                <th>Description</th>
                <th>Project</th>
                <th>Category</th>
                <th style="width:96px">Value</th>
              </tr>
            </thead>
            <tbody>
              ${entries.map(buildEntryRow).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function buildEntryRow(entry) {
      const id   = String(entry.timeentryid ?? '');
      const desc = (entry.taskDescription == null || String(entry.taskDescription).trim() === '')
        ? '(no description)' : String(entry.taskDescription).trim();
      const project  = String(entry.projectName ?? '').trim();
      const category = String(entry.projectCategoryName ?? '').trim();
      const duration = parseFloat(entry.duration) || 0;
      const tooltip  = project + (category ? ` · ${category}` : '');
      const accent = getCategoryAccent(category);

      return `
        <tr
          class="entry-row"
          draggable="true"
          data-entry-id="${escapeHtml(id)}"
          title="${escapeHtml(tooltip)}"
          style="--entry-accent:${escapeHtml(accent)}"
          aria-label="${escapeHtml(`${desc}. ${project || 'Unassigned project'}. ${category || 'Uncategorized'}. Value ${formatDuration(duration)}.`)}"
        >
          <td class="entry-category-cell"><div class="entry-category-bar" aria-hidden="true"></div></td>
          <td><div class="entry-description">${escapeHtml(desc)}</div></td>
          <td><div class="entry-project">${escapeHtml(project || 'Unassigned project')}</div></td>
          <td><div class="entry-category-name">${escapeHtml(category || 'Uncategorized')}</div></td>
          <td class="entry-value-cell"><span class="entry-duration">${formatDuration(duration)}</span></td>
        </tr>`;
    }

    // ── Drag & Drop ──
    function setupDragAndDrop() {
      const root = document.getElementById('widget-root');

      // Draggable entry rows
      root.querySelectorAll('.entry-row').forEach(row => {
        row.addEventListener('dragstart', e => {
          draggedId = row.dataset.entryId;
          row.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', draggedId);
        });
        row.addEventListener('dragend', () => {
          row.classList.remove('dragging');
        });
      });

      // Drop zones: entire day columns
      root.querySelectorAll('.day-column').forEach(col => {
        col.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          col.classList.add('drag-over');
        });

        col.addEventListener('dragleave', e => {
          if (!col.contains(e.relatedTarget)) {
            col.classList.remove('drag-over');
          }
        });

        col.addEventListener('drop', e => {
          e.preventDefault();
          col.classList.remove('drag-over');

          const targetKey = col.dataset.dateKey;
          if (!draggedId || !targetKey) return;

          const entry = timeEntries.find(en => String(en.timeentryid) === draggedId);
          if (!entry) return;

          const currentKey = entryDateKey(entry.date);
          if (currentKey === targetKey) return;

          const originalText = String(entry.date ?? '').trim();
          const originalDate = parseEntryDate(originalText);
          if (!originalDate) return;

          if (/^\d{4}-\d{2}-\d{2}$/.test(originalText)) {
            entry.date = targetKey;
            updateEntry(entry);
          } else {
            const [y, mo, d] = targetKey.split('-').map(Number);
            const updated = new Date(y, mo - 1, d, originalDate.getHours(), originalDate.getMinutes(), originalDate.getSeconds());
            entry.date = updated.toISOString();
            updateEntry(entry);
          }

          draggedId = null;
          renderWidget();
        });
      });
    }
